# @package _global_
# AMOS Dataset Configuration
# External validation dataset (test only)

paths:
  # Data packs (preprocessed CT volumes) - generated by prepack.py
  pack_root: /cachedata/ld258/amos/packs

  # Scalar features from radiomics pipeline
  features_parquet: /scratch/railabs/ld258/output/ct_triage/macroradiomics/amos/features/features_combined.parquet

  # Disease labels (harmonized to merlin label space)
  labels_csv: /scratch/railabs/ld258/output/ct_triage/macroradiomics/amos/amos_labels_harmonized_to_merlin.csv

  # Splits - AMOS is external test only
  train_ids: none
  val_ids: none
