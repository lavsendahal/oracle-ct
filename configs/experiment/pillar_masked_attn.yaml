# @package _global_

# Pillar-0 + 3D Organ-Masked Attention (Option B with anatomical guidance)
#
# Uses pretrained Pillar-0 AbdomenCT backbone with all 11 HU windows intact.
# Input: [B, 11, 384, 384, 384] from PillarDataset
# Features: spatial activ [B, 1152, 64, 64, 64] → 3D masked attention → per-disease Linear(1152, 1)
#
# Organ masks from existing .pt packs (224×224×160) are resized online
# to [64, 64, 64] for attention pooling — no repacking of masks needed.
#
# Use slurm_train_pillar_e2e.sub — it handles the modules cache, 8 GPUs, and model path.
#
# Fresh run:
#   sbatch slurm_train_pillar_e2e.sub experiment=pillar_masked_attn dataset=merlin_pillar
#
# Resume after preemption:
#   sbatch slurm_train_pillar_e2e.sub \
#     experiment=pillar_masked_attn dataset=merlin_pillar \
#     training.resume_from_checkpoint=/path/to/checkpoints/pillar_masked_attn_last.pt

model:
  name: OracleCT_Pillar_MaskedAttn
  num_diseases: 30
  disease_names: null               # null = use first 30 from ALL_DISEASES
  model_repo_id: "/scratch/railabs/ld258/output/ct_triage/oracle-ct/pretrained_models/Pillar0-AbdomenCT"
  model_revision: null
  freeze_backbone: false            # fine-tune backbone end-to-end
  modality: abdomen_ct
  learn_tau: true
  init_tau: 0.7
  use_mask_bias: true
  init_inside: 0.8
  init_outside: 0.2
  use_gradient_checkpointing: true  # saves ~40% activation memory for large backbone

dataset:
  # Pillar input is 11×384³ ≈ 1.2 GB/sample in fp16.
  # GPU budget (48 GB A6000, grad checkpointing):
  #   ~20 GB fixed overhead → ~28 GB for batch → batch_size=4 safe, try 6 if no OOM.
  # Effective batch = 4 × 8 GPUs × 4 accum = 128.
  batch_size: 1
  num_workers: 2
  prefetch_factor: 2

training:
  max_epochs: 20
  learning_rate: 1e-4               # lower LR for large pretrained backbone
  warmup_epochs: 2
  use_group_lrs: true
  head_lr_scale: 5.0                # score_convs + heads learn faster
  alpha_lr_scale: 0.3               # temperature + bias params slower
  gradient_accumulation_steps: 4   # 4 × 8 GPUs × 4 accum = 128 effective batch
  use_amp: true

logging:
  use_wandb: false
